# Monthly Article Refresh — updates dateModified for Google freshness signals
#
# Runs monthly so SEO metadata maintenance is automated, but not tied to every
# commit or push.

name: Monthly Article Refresh

on:
  schedule:
    - cron: "0 12 1 * *" # 1st of each month, 12:00 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Update dateModified on older articles
        run: node scripts/refresh-articles.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/journal/
          git diff --staged --quiet || git commit -m "chore: refresh dateModified for older articles"
          git push
