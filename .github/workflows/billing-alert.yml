name: Monthly Billing Alert

on:
  schedule:
    - cron: "0 9 25 * *" # 25th of every month at 9am UTC
  workflow_dispatch: {}

concurrency:
  group: billing-alert
  cancel-in-progress: true

jobs:
  check-billing:
    name: Check Actions minute usage
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check minutes used
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT_CODE=0
          RESPONSE=$(gh api /repos/${{ github.repository }}/actions/cache/usage)
          CACHE_GB=$(echo "$RESPONSE" | jq -r '(.active_caches_size_in_bytes // 0) / 1073741824 | floor')
          echo "Cache in use: ${CACHE_GB}GB"
          if [ "$CACHE_GB" -ge 8 ]; then
            echo "::error::Cache usage ${CACHE_GB}GB is at or above 8GB threshold — approaching the 10GB free-tier limit."
            EXIT_CODE=1
          fi
          echo ""
          echo "NOTE: GitHub does not expose per-user minute counts via unauthenticated API."
          echo "To check manually: Settings > Billing > Actions."
          echo "If Playwright moved to pre-push and CI is passing, minute usage should be well under 500/month."
          echo ""
          echo "Workflows in this repo:"
          gh api /repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | "\(.name): \(.state)"'
          exit $EXIT_CODE
