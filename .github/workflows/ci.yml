# .github/workflows/ci.yml
#
# NOTE: These checks run on every PR but do NOT block merges yet.
# Blocking requires branch protection, which requires GitHub Pro (private repo)
# or making the repo public. When you're ready:
#   → Run scripts/setup-branch-protection.sh (instructions inside)
#
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: Lint + Type Check + Tests + Build
  # One npm ci. Fast fail order: lint → types → tests → build → audit.
  # ==========================================
  check:
    name: Lint, Types, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npx astro check
      - run: npm test
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  # ==========================================
  # JOB 2: Smoke Tests (iPhone viewport)
  # 70% of traffic is mobile — test the viewport that matters most.
  # Runs after core checks pass. Catches JS crashes, broken routes,
  # modal/form regressions, a11y violations, and SEO meta failures.
  # The weekly scheduled run in smoke-tests.yml covers all 4 viewports.
  # ==========================================
  smoke:
    name: Smoke Tests (mobile)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run smoke tests (iPhone)
        run: npx playwright test --project iphone
      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
