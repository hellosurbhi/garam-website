# .github/workflows/ci.yml
#
# NOTE: These checks run on every PR but do NOT block merges yet.
# Blocking requires branch protection, which requires GitHub Pro (private repo)
# or making the repo public. When you're ready:
#   → Run scripts/setup-branch-protection.sh (instructions inside)
#
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Types, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx astro check
      - run: npm test
      - run: npm run build
