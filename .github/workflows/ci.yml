# .github/workflows/ci.yml
#
# The "Lint, Types, Test, Build" check below is REQUIRED by the repo ruleset
# "Protect Main" (managed in GitHub Settings, Rules). Two constraints follow:
#
# WHY there is no paths-ignore on the trigger (2026-07-14): a required check
# that never starts blocks the PR forever. The old `paths-ignore: **.md` meant
# every docs-only PR (BUGS.md/ENHANCEMENTS.md routing produces them routinely)
# sat permanently BLOCKED waiting for a check that would never report (hit on
# PR #139). Full CI now runs on EVERY PR by owner decision: no conditional
# skips and no success reported without the checks actually running, because
# a green check whose meaning varies by code path is a latent trap. Re-adding
# paths-ignore re-creates the deadlock; skip-but-report-success patterns were
# explicitly rejected as false success reporting.
#
# WHY the job name must not change: the ruleset matches the check by the exact
# string "Lint, Types, Test, Build". Renaming the job here without renaming the
# required check in the ruleset means the required name never reports again and
# every PR is permanently BLOCKED (the same deadlock, different trigger).
# Rename both together or neither.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: Lint + Type Check + Tests + Build
  # One npm ci. Fast fail order: lint → types → tests → build → audit.
  # ==========================================
  check:
    name: Lint, Types, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npx astro check
      - run: npm test
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  # Playwright smoke tests moved to local pre-push hook (~/.git-hooks/pre-push).
  # This eliminates the primary GitHub Actions minute consumer.
  # Production coverage: smoke-tests.yml runs weekly against all 4 viewports on schedule.
