# .github/workflows/ci.yml
#
# NOTE: These checks run on every PR but do NOT block merges yet.
# Blocking requires branch protection, which requires GitHub Pro (private repo)
# or making the repo public. When you're ready:
#   → Run scripts/setup-branch-protection.sh (instructions inside)
#
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "CHANGELOG.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: Lint + Type Check + Tests + Build
  # One npm ci. Fast fail order: lint → types → tests → build → audit.
  # ==========================================
  check:
    name: Lint, Types, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npx astro check
      - run: npm test
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  # Playwright smoke tests moved to local pre-push hook (~/.git-hooks/pre-push).
  # This eliminates the primary GitHub Actions minute consumer.
  # Production coverage: smoke-tests.yml runs weekly against all 4 viewports on schedule.
