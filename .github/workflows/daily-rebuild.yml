# Daily Rebuild — publishes scheduled journal articles and flips
# date-driven page states.
#
# The journal system hides articles with future datePublished values, and
# city pages derive their entire CTA state from event dates at build time
# (event ended -> page reverts to waitlist + follow CTAs; onSaleAt reached
# -> presale flips). This workflow triggers a Vercel redeploy daily so all
# date boundaries take effect within 24h with zero manual work.
#
# SETUP:
# 1. Go to Vercel Dashboard > Project > Settings > Git > Deploy Hooks
# 2. Create a hook named "Daily Scheduled Rebuild" for the main branch
# 3. Copy the URL and add it as a GitHub secret named VERCEL_DEPLOY_HOOK
#    (Repo > Settings > Secrets and variables > Actions > New repository secret)

name: Daily Rebuild

on:
  schedule:
    - cron: "0 6 * * *" # 6:00 AM UTC daily (2:00 AM ET)

permissions: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl --fail --silent --show-error --max-time 30 \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
