# Production health check — runs after code lands on main and Vercel deploys.
# Tests the actual live site, not a local build.
# This is NOT a merge gate — it tells you if the deploy broke production.
name: Production Health Check

on:
  push:
    branches: [main]

concurrency:
  group: smoke-${{ github.sha }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Production Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Wait for Vercel deployment
        # Astro SSG builds static HTML — the commit SHA is never embedded in page
        # content, so SHA-based polling can't confirm which deploy is live.
        # A fixed wait is the honest approach without a Vercel API token.
        # Upgrade path: add VERCEL_TOKEN secret + poll the Vercel Deployments API
        # (https://vercel.com/docs/rest-api/endpoints/deployments) to detect when
        # the deployment matching this commit reaches READY state.
        run: sleep 90
      - name: Run smoke tests against production
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://garammasaladating.com
      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
