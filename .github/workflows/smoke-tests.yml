# Smoke tests — weekly against production + on-demand before releases.
# Run manually with target=production to validate a specific deploy.
# Run manually with target=local (default) to test against a local build.
name: Smoke Tests

on:
  schedule:
    - cron: "0 11 * * 3" # Wednesdays at 11am UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Test target"
        required: false
        default: "local"
        type: choice
        options:
          - local
          - production

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ (github.event.inputs.target == 'production' || github.event_name == 'schedule') && 'https://garammasaladating.com' || '' }}
      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
